<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.id != null} ? 'Edit Produk' : 'Tambah Produk'">
        Form
    </title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>

<body>

<!-- FORM STATUS FOR NAME BERSIH FIELD REQUIRED -->
<div class="container mt-4">
    <h3 th:text="${product.id != null} ? 'Edit Produk' : 'Tambah Produk'"></h3>

    <form th:action="@{/products/save}" th:object="${product}" method="post" style="max-width: 600px;">

        <!-- ID (HIDDEN) -->
        <input type="hidden" th:field="*{id}"/>

        <!-- NAME -->
        <div class="mb-3">
            <label for="name" class="form-label">Nama Produk</label>
            <input type="text"
                   id="name"
                   th:field="*{name}"
                   class="form-control"
                   placeholder="Nama Produk">
        </div>

        <!-- CATEGORY -->
        <div class="mb-3">
            <label for="category" class="form-label">Kategori</label>

            <select class="form-select" th:field="*{category}" required>
                <option value="">Pilih Kategori</option>

                <option th:each="cat : ${categories}"
                        th:value="${cat}"
                        th:text="${cat}">
                </option>

            </select>
        </div>

        <!-- PRICE & STOCK -->
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="price" class="form-label">Harga (Rp)</label>
                <input type="number"
                       th:field="*{price}"
                       class="form-control"
                       min="0"
                       step="1000"
                       required>
            </div>

            <div class="col-md-6 mb-3">
                <label for="stock" class="form-label">Stok</label>
                <input type="number"
                       th:field="*{stock}"
                       class="form-control"
                       min="0"
                       required>
            </div>
        </div>

        <!-- DESCRIPTION -->
        <div class="mb-3">
            <label for="description" class="form-label">Deskripsi</label>
            <textarea th:field="*{description}"
                      class="form-control"
                      rows="3"></textarea>
        </div>

        <!-- ACTIVE -->
        <div class="form-check">
            <input type="checkbox"
                   th:field="*{active}"
                   class="form-check-input">

            <label for="active" class="form-check-label">
                Produk Aktif
            </label>
        </div>

        <br>

        <!-- BUTTON SUBMIT -->
        <div class="mt-3">
            <button type="submit" class="btn btn-primary"
                    th:text="${product.id != null} ? 'Update' : 'Simpan'">
                Simpan
            </button>

            <a th:href="@{/products}" class="btn btn-secondary">
                Batal
            </a>
        </div>

    </form>
</div>

</body>
</html>
